<div cdkDropList (cdkDropListDropped)="drop($event)" class="flex flex-col gap-4 p-6 bg-[#f8f9fa]">
  
  <div *ngFor="let item of data" cdkDrag class="bg-white rounded-xl border border-gray-100 shadow-sm group/parent">
    
    <div class="flex items-center justify-between p-4 cursor-pointer">
      <div class="flex items-center gap-3">
        <div cdkDragHandle class="opacity-0 group-hover/parent:opacity-100 transition-opacity cursor-grab p-1 text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
          </svg>
        </div>

        <div class="flex items-center gap-2" (click)="item.isOpen = !item.isOpen">
          <span class="p-2 text-indigo-600">
            <i *ngIf="item.type === 'DOCUMENT'" class="ph-file-text text-xl"></i>
            <i *ngIf="item.type === 'VIDEO'" class="ph-video-camera text-xl"></i>
          </span>
          <h3 class="font-bold text-gray-800">{{item.name}}</h3>
        </div>
      </div>
      
      <div (click)="item.isOpen = !item.isOpen" [class.rotate-180]="item.isOpen" class="transition-transform duration-300 text-indigo-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
      </div>
    </div>

    <div *ngIf="item.isOpen" 
         cdkDropList 
         [cdkDropListData]="item.document_detail"
         (cdkDropListDropped)="dropChild($event, item)" 
         class="border-t border-gray-50 bg-gray-50/50 px-6 pb-2">
      
      <div *ngFor="let detail of item.document_detail" cdkDrag 
           class="flex items-center justify-between py-4 border-b border-gray-100 last:border-0 group/child">
        
        <div class="flex items-center gap-3">
          <div cdkDragHandle class="opacity-0 group-hover/child:opacity-100 transition-opacity cursor-grab text-gray-300 hover:text-indigo-500">
             <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
             </svg>
          </div>
          <a href="javascript:void(0)" class="text-blue-600 underline font-medium">{{detail.name}}</a>
        </div>

        <div class="flex gap-2 opacity-0 group-hover/child:opacity-100 transition-opacity">
           </div>
      </div>
    </div>
  </div>
</div>
