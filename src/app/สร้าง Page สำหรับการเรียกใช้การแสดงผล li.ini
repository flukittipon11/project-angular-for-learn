สร้าง Page สำหรับการเรียกใช้การแสดงผล list ของข้อมูล
1. component global : สำหรับการรับ child component ที่เป็น list ของข้อมูลโดยประกอบไปด้วย name, และ การส่ง function ปุ่มแก้ไขและลบข้อมูล
2. child component : สำหรับการแสดงผล list ของข้อมูล โดยรับ props จาก mock data เพื่อนำมา map และ function ปุ่มแก้ไขและลบข้อมูล
3. จะต้องใช้ component drag and drop จาก angular cdk ในการจัดเรียงข้อมูลใน list

